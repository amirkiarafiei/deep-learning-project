# Track 2 v3 (A3 Hybrid) — multitask.
#
# Architectural family: still ConvNeXt-Tiny Siamese + concat-diff fusion
# (Track 1 architecture). Departures from Track 1:
#   - LDAM-DRW loss instead of BCE+pos_weight (Sulake CXR-LT 2026 SOTA recipe)
#   - cRT (classifier re-training) stage after Phase A
#   - Trained on CLEANED dataset (Gemini-relabeled top-500 train + entire val)
#   - At inference: multi-label logit adjustment + 4-way TTA + per-class
#     threshold tuning on cleaned val
#
# Expected runtime: ~3h A100 (similar to v1).

run_name: track2_v3_multitask
output_dir: results/track1_v3/multitask
seed: 42

data:
  # IMPORTANT: this points at the cleaned dataset produced by
  # src/scripts/reconcile_labels.py. The original dataset.json stays put.
  json_path: results/track1_v3/cleanup/dataset_v3_clean.json
  dataset_root: dataset
  image_size: 224
  batch_size: 64
  num_workers: 4

model:
  families: [object, event, attribute]
  include_changeflag: true
  pretrained_backbone: true
  head_dropout: 0.0                  # Skip head dropout; LDAM-DRW provides its own regularization.

training:
  epochs: 30
  lr_backbone: 1.0e-5
  lr_head: 1.0e-4
  weight_decay: 1.0e-4               # Back to v1's level (LDAM handles class balance).
  changeflag_weight: 0.5
  grad_clip: 1.0
  eta_min: 1.0e-6
  pos_weight_clamp_min: 1.0
  pos_weight_clamp_max: 10.0         # Used by LDAM-DRW Phase B.
  use_amp: true
  # LDAM-DRW + cRT settings.
  loss_type: ldam
  ldam_max_m: 0.3                    # conservative max margin; raise to 0.5 if training is stable
  ldam_s: 1.0                        # DISABLED — original LDAM scaling requires feature/weight L2-norm
                                     # which we don't have on plain nn.Linear heads; s=30 would either
                                     # be bypassed (network rescales weights) or saturate the sigmoid.
  ldam_drw_epoch: 5                  # earlier than patience to avoid early-stop firing at DRW
  early_stop_patience: 15            # bumped so patience doesn't expire right when DRW kicks in
  crt_epochs: 5                      # 5 epochs of head-only retraining on class-aware sampling
  crt_lr_head: 5.0e-5                # 10× more aggressive than before; heads need real updates
                                     # during cRT, and they're getting plain-BCE gradients only.

evaluation:
  threshold: 0.5
  logit_adjust_tau: 1.0              # full Bayes-optimal correction
  tta_views: "4"                     # 4-way dihedral TTA at inference
